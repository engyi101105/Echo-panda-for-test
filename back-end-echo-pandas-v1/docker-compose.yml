services:

  postgres:
    image: postgres:15
    container_name: echo-pandas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: echo_panda_db
      POSTGRES_USER: echo_panda_user
      POSTGRES_PASSWORD: 0ZFtEz8QNp2KhTSO7RSu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ets_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: echo-pandas-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - ets_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel11-app
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
    networks:
      - ets_network

  nginx:
    image: nginx:latest
    container_name: nginx-laravel
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - ets_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  ets_network:
    driver: bridge